# Database configuration (Pointing to the database you already made)
spring.datasource.url=jdbc:mysql://localhost:3306/student_utility_db
spring.datasource.username=root
spring.datasource.password=ENTER_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings (Creates/updates tables automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Allow large file uploads (PDFs up to 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.port=8081
# Groq AI Configuration
groq.api.key=TYPE_YOUR_KEY HERE
groq.api.url=https://api.groq.com/openai/v1/chat/completions
