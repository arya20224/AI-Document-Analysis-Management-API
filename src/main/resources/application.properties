# Database configuration - credentials come from environment variables,
# in your IDE run config or a local .env before running.
spring.datasource.url=jdbc:mysql://localhost:3306/document_processing_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings (creates/updates tables automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Allow file uploads up to 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8081

# Groq AI configuration
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
